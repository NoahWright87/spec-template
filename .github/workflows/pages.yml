name: Publish docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'specs/**'
      - 'scripts/generate-roadmap.sh'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate roadmap
        run: bash scripts/generate-roadmap.sh

      - name: Assemble site
        run: |
          mkdir -p _site/specs
          # Publish docs/ at the root of the site
          if [[ -d docs ]]; then
            cp -r docs/. _site/
          fi
          # Publish specs/ at /specs so roadmap links resolve correctly
          cp -r specs/. _site/specs/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
