name: Publish docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'specs/**'
      - 'scripts/generate-roadmap.sh'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    uses: NoahWright87/actions/.github/workflows/publish-docs.yml@main
    with:
      page_title: "Spec Template"
      folders: "docs,specs"
    permissions:
      pages: write
      id-token: write
