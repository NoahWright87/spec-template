# NOTE: This workflow will be replaced by reports.yml once the
# NoahWright87/repo-report composite action is available (see docs/reports/SETUP.md).
# At that point, reports.yml handles docs + specs + the reports app in one deployment.
# Until then, this workflow keeps docs/specs publishing while reports.yml is a no-op.
name: Publish docs to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'specs/**'
      - 'scripts/generate-roadmap.sh'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish:
    uses: NoahWright87/actions/.github/workflows/publish-docs.yml@main
    with:
      page_title: "Spec Template"
      folders: "docs,specs"
    permissions:
      contents: read
      pages: write
      id-token: write
