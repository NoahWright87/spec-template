apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Each overlay produces a CronJob for one target repo.
# To add a repo: copy overlays/example/ to overlays/{repo-name}/, then add it here.
resources:
  - overlays/spec-template

# Image tag management — update when publishing new worker versions
images:
  - name: ghcr.io/noahwright87/spec-template-worker
    newTag: latest
